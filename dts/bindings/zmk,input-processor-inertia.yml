description: ZMK Inertia Input Processor

compatible: "zmk,input-processor-inertia"

include: ip_zero_param.yaml

properties:
  trigger-ms:
    type: int
    required: true
    description: |
      The delay (ms) after manual input stops before inertia starts.
      IMPORTANT: To prevent "bouncing" or accidental triggers during manual movement,
      set this to AT LEAST TWICE the sensor's polling interval (e.g., 30ms for a 15ms sensor).

  move-decay-factor-int:
    type: int
    required: true
    description: |
      Velocity retention percentage (0-100) per report interval.
      Higher values (e.g., 95) make the movement feel slipperier and longer-lasting.

  move-report-interval-ms:
    type: int
    required: true
    description: |
      The time interval (ms) for calculating and sending inertia movement reports.
      Matching this to your sensor's polling rate (e.g., 15ms) provides the smoothest transition.

  move-threshold-start:
    type: int
    required: true
    description: |
      Minimum velocity magnitude from the last manual input required to start inertia.
      Prevents accidental sliding from micro-gestures.

  move-threshold-stop:
    type: int
    required: true
    description: |
      Minimum velocity magnitude required to continue inertia movement.
      Once velocity falls below this, the inertia movement stops completely.

  scroll-decay-factor-int:
    type: int
    required: true
    description: |
      Velocity retention percentage for scrolling. Higher values result in longer scrolls.

  scroll-report-interval-ms:
    type: int
    required: true
    description: |
      The time interval (ms) for scroll inertia updates.

  scroll-threshold-start:
    type: int
    required: true
    description: |
      Minimum scroll velocity magnitude to activate inertia.

  scroll-threshold-stop:
    type: int
    required: true
    description: |
      Minimum scroll velocity to continue inertia.